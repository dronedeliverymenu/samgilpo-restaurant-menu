<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>삼길포항 드론배달 메뉴판</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif; background: #5bb8f5; height: 100vh; display: flex; align-items: center; justify-content: center; }

  .overlay {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem;
    width: 100%;
  }
  .overlay h2 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; }
  .overlay p { color: rgba(255,255,255,0.8); font-size: 14px; margin-bottom: 2rem; text-align: center; }
  .zoodae-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 14px; width: 100%; max-width: 400px;
  }
  .zoodae-btn {
    background: #fff; border: none; border-radius: 14px;
    padding: 1.5rem 0.75rem; font-size: 15px; font-weight: 700;
    color: #1a1a2e; cursor: pointer; text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    transition: transform 0.1s, box-shadow 0.1s;
    text-decoration: none; display: block;
  }
  .zoodae-btn.wide {
    grid-column: 1 / 3;
  }
  .zoodae-btn:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .zoodae-btn span { display: block; font-size: 28px; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="overlay">
  <h2>어디 좌대에 계신가요?</h2>
  <p>좌대를 선택하면 메뉴가 표시됩니다</p>
  <div class="zoodae-grid">
    <a class="zoodae-btn" href="https://dronedeliverymenu.github.io/Samgilpo-Manseok/">
      <span>🎣</span>만석<br>좌대
    </a>
    <a class="zoodae-btn" href="https://dronedeliverymenu.github.io/Samgilpo-Uri/">
      <span>🎣</span>우리<br>좌대
    </a>
    <a class="zoodae-btn wide" href="https://dronedeliverymenu.github.io/Samgilpo-Daeho-baeknyeon/">
      <span>🎣</span>대호 / 백년 좌대
    </a>
  </div>
</div>
</body>
</html>
